<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" width="280" height="160">
  <!-- Audy Dental Logo - Navy Blue -->
  
  <!-- Script "Audy" text rendered as paths approximating the cursive style -->
  <!-- Using embedded text with system cursive font fallback -->
  <style>
    .logo-script {
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, 'URW Palladio L', serif;
      font-size: 78px;
      font-style: italic;
      font-weight: 400;
      fill: #1a237e;
      letter-spacing: -2px;
    }
    .logo-dental {
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.42em;
      fill: #1a237e;
    }
  </style>

  <!-- Script lettering "Audy" -->
  <text x="140" y="100" text-anchor="middle" class="logo-script">Audy</text>
  
  <!-- Divider lines flanking DENTAL -->
  <line x1="18" y1="128" x2="72" y2="128" stroke="#1a237e" stroke-width="1.2"/>
  <line x1="208" y1="128" x2="262" y2="128" stroke="#1a237e" stroke-width="1.2"/>
  
  <!-- "DENTAL" spaced text -->
  <text x="140" y="138" text-anchor="middle" class="logo-dental">DENTAL</text>
</svg>
